name: Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "13 5 * * 1"

permissions:
  contents: read
  id-token: write

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jacoco:
    name: Android unit-test coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4608m -Dfile.encoding=UTF-8
    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run unit-test coverage
        run: ./gradlew --no-daemon --stacktrace coverageReport

      - name: Collect coverage report paths
        id: coverage-files
        run: |
          files="$(find . -path '*/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml' -type f | sort | paste -sd, -)"
          if [ -z "$files" ]; then
            echo "No JaCoCo XML coverage reports were generated." >&2
            exit 1
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"

      - name: Publish coverage summary
        if: always()
        run: |
          python3 <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          summary_file = os.environ["GITHUB_STEP_SUMMARY"]
          files = sorted(glob.glob("**/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml", recursive=True))

          if not files:
              with open(summary_file, "a", encoding="utf-8") as summary:
                  summary.write("### Android unit-test coverage\n\nCoverage reports were not generated.\n")
              raise SystemExit(0)

          counters = {}
          for coverage_file in files:
              root = ET.parse(coverage_file).getroot()
              for counter in root.findall("counter"):
                  counter_type = counter.attrib["type"]
                  missed, covered = counters.get(counter_type, (0, 0))
                  counters[counter_type] = (
                      missed + int(counter.attrib.get("missed", "0")),
                      covered + int(counter.attrib.get("covered", "0")),
                  )

          def percent(covered, total):
              if total == 0:
                  return "n/a"
              return f"{covered / total * 100:.2f}%"

          with open(summary_file, "a", encoding="utf-8") as summary:
              summary.write("### Android unit-test coverage\n\n")
              summary.write(f"Aggregated {len(files)} JaCoCo XML report(s).\n\n")
              summary.write("| Metric | Covered | Total | Coverage |\n")
              summary.write("| --- | ---: | ---: | ---: |\n")
              for counter_type in ("INSTRUCTION", "LINE", "BRANCH", "METHOD", "CLASS"):
                  missed, covered = counters.get(counter_type, (0, 0))
                  total = missed + covered
                  summary.write(f"| {counter_type.title()} | {covered} | {total} | {percent(covered, total)} |\n")
              summary.write("\n")
          PY

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: ${{ steps.coverage-files.outputs.files }}
          disable_search: true
          flags: android-unit
          name: passly-android-jacoco
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-android
          path: |
            **/build/reports/jacoco/jacocoDebugUnitTestReport/
          if-no-files-found: ignore
